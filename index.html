<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 2rem;
      color: #e94560;
    }

    /* Auth styles */
    .auth-box {
      background: #16213e;
      border-radius: 12px;
      padding: 32px 24px;
    }

    .auth-box h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #e94560;
      font-size: 1.3rem;
    }

    .auth-box input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #0f3460;
      border-radius: 8px;
      background: #1a1a2e;
      color: #eee;
      font-size: 1rem;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .auth-box input:focus {
      border-color: #e94560;
    }

    .auth-box .btn {
      width: 100%;
      padding: 12px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 12px;
    }

    .auth-box .btn:hover { background: #c73651; }
    .auth-box .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-toggle {
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
    }

    .auth-toggle a {
      color: #e94560;
      cursor: pointer;
      text-decoration: underline;
    }

    .msg {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }

    .msg.error { background: #3a1525; color: #ff6b8a; }
    .msg.success { background: #153a25; color: #6bff8a; }

    /* Header bar */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .header-bar h1 { margin-bottom: 0; }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #aaa;
    }

    .logout-btn {
      padding: 6px 12px;
      background: #0f3460;
      color: #aaa;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .logout-btn:hover { background: #e94560; color: #fff; }

    /* Todo styles */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #16213e;
      border-radius: 8px;
      background: #16213e;
      color: #eee;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #e94560; }

    .input-row button {
      padding: 12px 20px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #c73651; }

    .filters {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      padding: 6px 14px;
      border: 1px solid #0f3460;
      border-radius: 20px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #0f3460;
      color: #fff;
      border-color: #0f3460;
    }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }

    li.done span { text-decoration: line-through; opacity: 0.5; }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #e94560;
      cursor: pointer;
    }

    li span { flex: 1; font-size: 1rem; }

    li .delete-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    li .delete-btn:hover { color: #e94560; }

    .empty {
      text-align: center;
      color: #555;
      margin-top: 32px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Auth Screen -->
    <div id="authScreen">
      <h1>Todo App</h1>
      <div class="auth-box">
        <h2 id="authTitle">Giris Yap</h2>
        <div id="authMsg" class="hidden"></div>
        <input type="email" id="emailInput" placeholder="E-posta adresi">
        <input type="password" id="passwordInput" placeholder="Sifre (min 6 karakter)">
        <button class="btn" id="authBtn" onclick="handleAuth()">Giris Yap</button>
        <p class="auth-toggle">
          <span id="toggleText">Hesabin yok mu?</span>
          <a id="toggleLink" onclick="toggleAuthMode()">Kayit Ol</a>
        </p>
      </div>
    </div>

    <!-- Todo Screen -->
    <div id="todoScreen" class="hidden">
      <div class="header-bar">
        <h1>Todo App</h1>
        <div class="user-info">
          <span id="userEmail"></span>
          <button class="logout-btn" onclick="logout()">Cikis</button>
        </div>
      </div>

      <div class="input-row">
        <input type="text" id="todoInput" placeholder="Yeni gorev ekle...">
        <button onclick="addTodo()">Ekle</button>
      </div>

      <div class="filters">
        <button class="active" onclick="setFilter('all', this)">Tumu</button>
        <button onclick="setFilter('active', this)">Aktif</button>
        <button onclick="setFilter('done', this)">Tamamlanan</button>
      </div>

      <ul id="todoList"></ul>
    </div>

  </div>

  <script>
    const SUPABASE_URL = 'https://tbucmnjcmixwxajfavbi.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRidWNtbmpjbWl4d3hhamZhdmJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODI4OTAsImV4cCI6MjA4OTg1ODg5MH0.2haD4ecIdtmrXMgXmYnYdxgT2YOsjvlbcvTlSiFm-4M';
    const API = `${SUPABASE_URL}/rest/v1/todos`;
    const AUTH = `${SUPABASE_URL}/auth/v1`;

    let todos = [];
    let filter = 'all';
    let isLogin = true;
    let session = null;

    const authScreen = document.getElementById('authScreen');
    const todoScreen = document.getElementById('todoScreen');
    const authMsg = document.getElementById('authMsg');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const todoInput = document.getElementById('todoInput');
    const list = document.getElementById('todoList');

    passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth(); });
    todoInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    // --- Auth ---

    function showMsg(text, type) {
      authMsg.textContent = text;
      authMsg.className = `msg ${type}`;
      authMsg.classList.remove('hidden');
    }

    function hideMsg() {
      authMsg.classList.add('hidden');
    }

    function toggleAuthMode() {
      isLogin = !isLogin;
      hideMsg();
      document.getElementById('authTitle').textContent = isLogin ? 'Giris Yap' : 'Kayit Ol';
      document.getElementById('authBtn').textContent = isLogin ? 'Giris Yap' : 'Kayit Ol';
      document.getElementById('toggleText').textContent = isLogin ? 'Hesabin yok mu?' : 'Zaten hesabin var mi?';
      document.getElementById('toggleLink').textContent = isLogin ? 'Kayit Ol' : 'Giris Yap';
    }

    async function handleAuth() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      hideMsg();

      if (!email || !password) {
        showMsg('E-posta ve sifre gerekli.', 'error');
        return;
      }
      if (password.length < 6) {
        showMsg('Sifre en az 6 karakter olmali.', 'error');
        return;
      }

      const btn = document.getElementById('authBtn');
      btn.disabled = true;

      if (isLogin) {
        const res = await fetch(`${AUTH}/token?grant_type=password`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        btn.disabled = false;

        if (data.error) {
          const msg = data.error_description || data.msg || data.error;
          if (msg.includes('Email not confirmed')) {
            showMsg('E-postanizi onaylamaniz gerekiyor. Gelen kutunuzu kontrol edin.', 'error');
          } else if (msg.includes('Invalid login credentials')) {
            showMsg('E-posta veya sifre hatali.', 'error');
          } else {
            showMsg(msg, 'error');
          }
          return;
        }

        session = data;
        localStorage.setItem('sb_session', JSON.stringify(data));
        showTodoScreen();
      } else {
        const res = await fetch(`${AUTH}/signup`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        btn.disabled = false;

        if (data.error) {
          showMsg(data.error_description || data.msg || data.error, 'error');
          return;
        }

        showMsg('Kayit basarili! Lutfen e-postaniza gelen onay linkine tiklayin.', 'success');
        emailInput.value = '';
        passwordInput.value = '';
      }
    }

    function getAuthHeaders() {
      return {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${session.access_token}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      };
    }

    async function refreshToken() {
      if (!session || !session.refresh_token) return false;
      const res = await fetch(`${AUTH}/token?grant_type=refresh_token`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: session.refresh_token })
      });
      if (!res.ok) return false;
      session = await res.json();
      localStorage.setItem('sb_session', JSON.stringify(session));
      return true;
    }

    function showTodoScreen() {
      authScreen.classList.add('hidden');
      todoScreen.classList.remove('hidden');
      document.getElementById('userEmail').textContent = session.user.email;
      fetchTodos();
    }

    function logout() {
      session = null;
      todos = [];
      localStorage.removeItem('sb_session');
      todoScreen.classList.add('hidden');
      authScreen.classList.remove('hidden');
      hideMsg();
      emailInput.value = '';
      passwordInput.value = '';
    }

    // --- Todos ---

    async function fetchTodos() {
      const res = await fetch(`${API}?order=created_at.asc`, { headers: getAuthHeaders() });
      if (res.status === 401) {
        if (await refreshToken()) return fetchTodos();
        logout();
        return;
      }
      todos = await res.json();
      render();
    }

    async function addTodo() {
      const text = todoInput.value.trim();
      if (!text) return;
      todoInput.value = '';
      const res = await fetch(API, {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({ text, done: false, user_id: session.user.id })
      });
      if (res.status === 401) {
        if (await refreshToken()) return addTodo();
        logout();
        return;
      }
      const [newTodo] = await res.json();
      todos.push(newTodo);
      render();
    }

    async function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      todo.done = !todo.done;
      render();
      await fetch(`${API}?id=eq.${id}`, {
        method: 'PATCH',
        headers: getAuthHeaders(),
        body: JSON.stringify({ done: todo.done })
      });
    }

    async function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      render();
      await fetch(`${API}?id=eq.${id}`, {
        method: 'DELETE',
        headers: getAuthHeaders()
      });
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<p class="empty">Gorev yok</p>';
        return;
      }

      list.innerHTML = filtered.map(t => `
        <li class="${t.done ? 'done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
          <span>${t.text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
          <button class="delete-btn" onclick="deleteTodo(${t.id})">&times;</button>
        </li>
      `).join('');
    }

    // --- Handle email confirmation redirect ---
    async function handleEmailConfirmation() {
      const params = new URLSearchParams(window.location.search);
      const confirmationUrl = params.get('confirmation_url');
      if (confirmationUrl) {
        // Call the Supabase confirmation URL in the background
        const res = await fetch(confirmationUrl, { redirect: 'follow' });
        // Clean up the URL
        window.history.replaceState({}, '', window.location.pathname);

        // Check if we got tokens in the hash after redirect
        if (window.location.hash) {
          return handleHashTokens();
        }

        showMsg('E-postaniz onaylandi! Simdi giris yapabilirsiniz.', 'success');
        return true;
      }

      // Handle hash-based token response (Supabase redirects with #access_token=...)
      if (window.location.hash && window.location.hash.includes('access_token')) {
        return handleHashTokens();
      }

      return false;
    }

    function handleHashTokens() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      const refreshTokenVal = params.get('refresh_token');

      if (accessToken) {
        // Decode the JWT to get user info
        const payload = JSON.parse(atob(accessToken.split('.')[1]));
        session = {
          access_token: accessToken,
          refresh_token: refreshTokenVal,
          user: { id: payload.sub, email: payload.email }
        };
        localStorage.setItem('sb_session', JSON.stringify(session));
        window.history.replaceState({}, '', window.location.pathname);
        showTodoScreen();
        return true;
      }
      return false;
    }

    // --- Init ---
    (async function init() {
      // First check for email confirmation or hash tokens
      if (await handleEmailConfirmation()) return;

      // Then check for saved session
      const saved = localStorage.getItem('sb_session');
      if (saved) {
        session = JSON.parse(saved);
        if (await refreshToken()) {
          showTodoScreen();
        } else {
          logout();
        }
      }
    })();
  </script>
</body>
</html>
