<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 2rem;
      color: #e94560;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #16213e;
      border-radius: 8px;
      background: #16213e;
      color: #eee;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #e94560;
    }

    .input-row button {
      padding: 12px 20px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #c73651;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      padding: 6px 14px;
      border: 1px solid #0f3460;
      border-radius: 20px;
      background: transparent;
      color: #aaa;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #0f3460;
      color: #fff;
      border-color: #0f3460;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }

    li.done span {
      text-decoration: line-through;
      opacity: 0.5;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #e94560;
      cursor: pointer;
    }

    li span {
      flex: 1;
      font-size: 1rem;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    li .delete-btn:hover {
      color: #e94560;
    }

    .empty {
      text-align: center;
      color: #555;
      margin-top: 32px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo App</h1>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Yeni gorev ekle...">
      <button onclick="addTodo()">Ekle</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tumu</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <ul id="todoList"></ul>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    const input = document.getElementById('todoInput');
    const list = document.getElementById('todoList');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.push({ text, done: false, id: Date.now() });
      input.value = '';
      save();
      render();
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.done = !todo.done;
      save();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<p class="empty">Gorev yok</p>';
        return;
      }

      list.innerHTML = filtered.map(t => `
        <li class="${t.done ? 'done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id})">
          <span>${t.text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
          <button class="delete-btn" onclick="deleteTodo(${t.id})">&times;</button>
        </li>
      `).join('');
    }

    render();
  </script>
</body>
</html>
